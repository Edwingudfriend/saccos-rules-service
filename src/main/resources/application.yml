server:
  port: 8088

spring:
  application:
    name: rules-service
  datasource:
    url: jdbc:mariadb://${DB_HOST:mifos-mariadb-dev}:3306/rules_db
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:Dev_Secure_Pass_2026!}
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  secret: ${JWT_SECRET}

management:
  endpoints:
    web:
      exposure:
        include: health,info
